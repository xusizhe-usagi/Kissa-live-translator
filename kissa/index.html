<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>喫茶マクロ 同声传译</title>
<meta name="theme-color" content="#241a14">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --espresso: #241a14;      /* 深咖啡:教室里不刺眼 */
    --espresso-2: #2f231b;
    --cream: #f5e9c9;         /* 兔子的奶油色 */
    --cream-dim: #c9bda0;
    --cheek: #f2a7b3;         /* 兔子腮红粉 */
    --live: #8fd694;
    --warn: #f0b429;
    --err: #e5735f;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--espresso);
    color: var(--cream);
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", "PingFang SC", "Noto Sans CJK", system-ui, sans-serif;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    border-bottom: 1px solid #3d2f24;
  }
  header img { width: 34px; height: 34px; border-radius: 10px; }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: .04em; }
  header .sub { font-size: 11px; color: var(--cream-dim); }
  header .spacer { flex: 1; }
  .iconbtn {
    background: var(--espresso-2); color: var(--cream);
    border: 1px solid #4a3a2c; border-radius: 10px;
    padding: 8px 12px; font-size: 13px;
  }

  .statusbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; font-size: 12px; color: var(--cream-dim);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #6b5b4a; flex: none; }
  .dot.live { background: var(--live); box-shadow: 0 0 8px var(--live); animation: pulse 1.6s infinite; }
  .dot.connecting, .dot.reconnecting { background: var(--warn); animation: pulse .8s infinite; }
  .dot.error { background: var(--err); }
  @keyframes pulse { 50% { opacity: .4; } }
  #timer { font-variant-numeric: tabular-nums; }
  .levelwrap { flex: 1; height: 4px; background: #3d2f24; border-radius: 2px; overflow: hidden; }
  #level { height: 100%; width: 100%; background: var(--cheek); transform: scaleX(0); transform-origin: left; transition: transform .1s; }

  #stage {
    flex: 1; overflow-y: auto; padding: 10px 16px 20px;
    overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
  }
  .line { margin-bottom: 16px; }
  .line .ja { font-size: 13px; color: var(--cream-dim); line-height: 1.5; }
  .line .zh { font-size: 18px; font-weight: 600; line-height: 1.55; margin-top: 2px; }
  #partialJa {
    font-size: 13px; color: #8d7c63; font-style: italic; min-height: 20px;
    padding: 0 16px 8px;
  }
  #stage:empty::before, .empty-hint {
    content: ""; display: block; color: #6b5b4a; font-size: 13px; text-align: center; margin-top: 40px;
  }

  .exportbar {
    display: flex; gap: 8px; padding: 8px 14px; overflow-x: auto;
    border-top: 1px solid #3d2f24; flex: none;
  }
  .exportbar button {
    background: var(--espresso-2); color: var(--cream);
    border: 1px solid #4a3a2c; border-radius: 10px;
    padding: 8px 12px; font-size: 12px; white-space: nowrap;
  }

  .mainbar {
    padding: 10px 16px calc(env(safe-area-inset-bottom) + 12px);
    flex: none;
  }
  #btnMain {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: var(--cheek); color: #4a2028; font-size: 17px; font-weight: 800;
    letter-spacing: .1em;
  }
  #btnMain.stop { background: var(--err); color: #fff; }
  #btnMain:active { filter: brightness(.9); }

  /* 术语表面板 */
  #glossaryPanel {
    position: fixed; inset: 0; background: var(--espresso);
    transform: translateY(100%); transition: transform .25s ease;
    display: flex; flex-direction: column; z-index: 20;
    padding: calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 12px);
  }
  #glossaryPanel.open { transform: translateY(0); }
  #glossaryPanel h2 { font-size: 15px; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  select, textarea {
    background: var(--espresso-2); color: var(--cream);
    border: 1px solid #4a3a2c; border-radius: 10px; font-size: 13px;
  }
  select { padding: 10px; flex: 1; }
  #glossaryText { flex: 1; width: 100%; padding: 10px; resize: none; line-height: 1.6; margin-bottom: 10px; font-family: inherit; }
  .hint { font-size: 11px; color: #8d7c63; margin-bottom: 8px; line-height: 1.5; }
  label.filebtn {
    display: inline-block; background: var(--espresso-2); border: 1px solid #4a3a2c;
    border-radius: 10px; padding: 8px 12px; font-size: 12px;
  }
  input[type=file] { display: none; }

  #toast {
    position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%) translateY(20px);
    background: #3d2f24; color: var(--cream); border-radius: 12px;
    padding: 10px 16px; font-size: 13px; opacity: 0; pointer-events: none;
    transition: all .25s; max-width: 86vw; z-index: 30;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header>
    <img src="./icons/icon-192.png" alt="兔子">
    <div>
      <h1>喫茶マクロ 同声传译</h1>
      <div class="sub" id="subjectLabel">日语课堂 → 中文字幕 · 全程录音</div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="btnGlossary">术语表</button>
  </header>

  <div class="statusbar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">待机</span>
    <span id="timer">00:00:00</span>
    <div class="levelwrap"><div id="level"></div></div>
  </div>

  <div id="stage">
    <div id="subtitles"></div>
  </div>
  <div id="partialJa"></div>

  <div class="exportbar">
    <button id="btnTxt">导出TXT</button>
    <button id="btnSrt">导出SRT</button>
    <button id="btnJson">导出JSON</button>
    <button id="btnCopy">复制全部</button>
    <button id="btnRec">导出录音</button>
    <button id="btnClear">清空缓存</button>
  </div>

  <div class="mainbar">
    <button id="btnMain">开始同传</button>
  </div>

  <div id="glossaryPanel">
    <h2>术语表(按学科)</h2>
    <div class="row">
      <select id="subjectSelect"></select>
      <button class="iconbtn" id="btnNewSubject">新学科</button>
    </div>
    <div class="hint">
      每行一条:<b>日语=中文=英语</b>(英语可省)。导入支持 app_lexicon_import.json、CSV(term_ja/term_zh 列)、或纯文本。
      翻译时只把当前句命中的术语喂给模型,表再大也不费钱。
    </div>
    <textarea id="glossaryText" spellcheck="false"></textarea>
    <div class="row">
      <label class="filebtn">导入文件<input type="file" id="importFile" accept=".json,.csv,.txt"></label>
      <button class="iconbtn" id="btnSaveGlossary">保存</button>
      <div class="spacer" style="flex:1"></div>
      <button class="iconbtn" id="btnCloseGlossary">关闭</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="./glossary-builtin.js?v=20260710-ga2"></script>
  <script src="./providers.js?v=20260710-ga2"></script>
  <script src="./app.js?v=20260710-ga2"></script>
</body>
</html>
